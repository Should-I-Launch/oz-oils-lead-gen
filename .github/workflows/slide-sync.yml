name: Slide Sync

on:
  push:
    paths:
      - '**/slides/*/index.tsx'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changed deck paths
        id: extract
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} 2>/dev/null | grep 'slides/.*/index.tsx' || echo "")
          
          if [ -z "$CHANGED" ]; then
            echo "No slide changes detected."
            echo "changed_files=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Changed slide files:"
          echo "$CHANGED"
          
          PAYLOAD=$(echo "$CHANGED" | while read -r path; do
            DECK_ID=$(echo "$path" | sed -n 's|.*slides/\(.*\)/index\.tsx|\1|p')
            echo "{\"deck_id\":\"$DECK_ID\",\"path\":\"$path\"}"
          done | jq -s '.')
          
          echo "payload<<EOF" >> $GITHUB_OUTPUT
          echo "$PAYLOAD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Notify Hermes
        if: steps.extract.outputs.changed_files != ''
        run: |
          PAYLOAD='{"repo":"${{ github.repository }}","branch":"${{ github.ref_name }}","decks":${{ steps.extract.outputs.payload }}}'
          
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "3f1a4b54b45e70c9a632bce3e2913219e0fa8966ce43c5ff05533b1c4647d760" | sed 's/^.* //')
          
          curl -s -X POST http://170.64.182.105:8644/webhooks/slide-sync \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" \
            --connect-timeout 10 --max-time 30
          
          echo "Webhook sent."
