services:
  db:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.hypajump-backend.rule=Host(`${BACKEND_HOST}`)
      - traefik.http.routers.hypajump-backend.entrypoints=websecure
      - traefik.http.routers.hypajump-backend.tls=true
      - traefik.http.routers.hypajump-backend.tls.certresolver=letsencrypt
      - traefik.http.services.hypajump-backend.loadbalancer.server.port=8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - default
      - traefik

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file: .env
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.hypajump-frontend.rule=Host(`${FRONTEND_HOST}`)
      - traefik.http.routers.hypajump-frontend.entrypoints=websecure
      - traefik.http.routers.hypajump-frontend.tls=true
      - traefik.http.routers.hypajump-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.hypajump-frontend.loadbalancer.server.port=3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/dist
    command: npm run dev
    networks:
      - default
      - traefik

volumes:
  postgres_data:

networks:
  traefik:
    external: true
    name: dokploy-network
